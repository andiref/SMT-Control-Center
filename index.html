<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>SMT Control Center</title>
    <style>
        /* ── all styles identical to the previous version ── */
        /* (copy the full style block from the previous answer) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1c1c26;
            --border: #2a2a3a;
            --text: #e8e8f0;
            --muted: #6b6b80;
            --accent: #3b82f6;
            --accent2: #60a5fa;
            --critical: #ef4444;
            --high: #f97316;
            --medium: #eab308;
            --low: #22c55e;
            --green: #22c55e;
            --radius: 12px;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }
        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 15px;
            line-height: 1.4;
        }
        body {
            display: flex;
            flex-direction: column;
            max-width: 480px;
            margin: 0 auto;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: .4;
            }
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── LOGIN OVERLAY ── */
        #login-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity .4s ease;
        }
        #login-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px 28px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .7);
        }
        #login-box .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff;
            text-align: center;
            margin-bottom: 4px;
        }
        #login-box .sub {
            text-align: center;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 24px;
        }
        #login-box .sub span {
            color: var(--accent2);
        }
        .login-field {
            margin-bottom: 14px;
        }
        .login-field label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }
        .login-field input {
            width: 100%;
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 14px;
            font-size: 14px;
            font-family: var(--font);
            outline: none;
            transition: border .15s;
        }
        .login-field input:focus {
            border-color: var(--accent);
        }
        .login-btn {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background .15s;
            margin-top: 6px;
        }
        .login-btn:hover {
            background: #2563eb;
        }
        .login-btn:disabled {
            background: var(--surface2);
            color: var(--muted);
            cursor: not-allowed;
        }
        .login-error {
            color: var(--critical);
            font-size: 12px;
            margin-top: 6px;
            min-height: 20px;
        }
        .login-role-hint {
            font-size: 10px;
            color: var(--muted);
            text-align: center;
            margin-top: 8px;
            opacity: .7;
        }
        .login-create-admin {
            margin-top: 16px;
            border-top: 1px solid var(--border);
            padding-top: 16px;
            display: none;
        }
        .login-create-admin.show {
            display: block;
        }
        .login-create-admin .login-btn {
            background: #16a34a;
        }
        .login-create-admin .login-btn:hover {
            background: #15803d;
        }

        /* ── APP (all styles from previous version) ── */
        #app {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        #app.show {
            display: flex;
        }
        /* ... (the rest of the styles are identical to the previous answer) ... */
        /* To save space, I assume you copy the entire style block from the previous response. */
        /* The functionality is what matters here. */
    </style>
</head>
<body>

    <!-- ─── LOGIN OVERLAY ─── -->
    <div id="login-overlay">
        <!-- same as before -->
        <div id="login-box">
            <div class="logo">⚙️ SMT Control</div>
            <div class="sub">Shift &amp; Quality · <span>Login</span></div>
            <form id="login-form" autocomplete="off">
                <div class="login-field">
                    <label>Your Name</label>
                    <input id="login-name" type="text" placeholder="e.g. John Doe" required />
                </div>
                <div class="login-field">
                    <label>Badge ID</label>
                    <input id="login-badge" type="text" placeholder="e.g. 1234" required />
                </div>
                <div id="login-error" class="login-error"></div>
                <button class="login-btn" id="login-btn" type="submit">Sign In →</button>
            </form>
            <div class="login-role-hint">Contact admin for badge and role</div>
            <div class="login-create-admin" id="create-admin-section">
                <div style="font-size:12px;color:var(--muted);margin-bottom:8px;text-align:center">🔑 No users found — create the first admin account</div>
                <div class="login-field"><label>Admin Name</label><input id="create-admin-name" type="text" placeholder="e.g. Admin" /></div>
                <div class="login-field"><label>Admin Badge</label><input id="create-admin-badge" type="text" placeholder="e.g. 0000" /></div>
                <button class="login-btn" id="create-admin-btn" style="background:#16a34a">Create Admin →</button>
                <div id="create-admin-error" class="login-error" style="margin-top:6px"></div>
            </div>
        </div>
    </div>

    <!-- ─── APP ─── -->
    <div id="app">
        <!-- Same HTML structure as before – no changes needed -->
        <div id="sync-bar">...</div>
        <div id="header">...</div>
        <div id="line-grid"></div>
        <div id="nav">...</div>
        <div id="main">
            <!-- board, add, summary, archive, handover, linereport, users views (unchanged) -->
            <!-- ... -->
        </div>
        <div id="confirm-overlay">...</div>
        <div id="toast"></div>
    </div>

    <!-- ─── FIREBASE & LIBS ─── -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js">
    </script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js">
    </script>

    <script>
        // ─── FIREBASE INIT ────────────────────────────────────────────────
        firebase.initializeApp({
            apiKey: "AIzaSyCULkpiLSXT79nrWWFl5IVJANhUEA8WJWU",
            authDomain: "smt-dashboard-cd090.firebaseapp.com",
            databaseURL: "https://smt-dashboard-cd090-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "smt-dashboard-cd090",
            storageBucket: "smt-dashboard-cd090.firebasestorage.app",
            messagingSenderId: "468538505165",
            appId: "1:468538505165:web:a491ecbcf5fd75b1a1f684"
        });
        var db = firebase.database();

        // ─── STATE ──────────────────────────────────────────────────────────
        var currentUser = null; // { badge, name, role }
        var tasks = {};
        var handovers = {};
        var lineReports = {};
        var lineStatus = { L1: 'OK', L2: 'OK', L3: 'OK', L4: 'OK', L5: 'OK', L6: 'OK' };
        var currentView = 'board';
        var toastTimer;
        var confirmCallback = null;
        var editingReportId = null;
        var editingHandoverId = null;

        var LINES = ['L1', 'L2', 'L3', 'L4', 'L5', 'L6'];
        var PRIORITIES = ['Critical', 'High', 'Medium', 'Low'];
        var STATUSES = ['Open', 'In Progress', 'Pending Parts', 'Resolved'];
        var CATS = ['Quality Issue', 'Equipment Fault', 'Process Issue', 'Technician Task', 'Preventive Maint.'];
        var CAT_ICON = { 'Quality Issue': '🔍', 'Equipment Fault': '⚙️', 'Process Issue': '📋', 'Technician Task': '👷',
            'Preventive Maint.': '🛠️' };

        // ─── ROLE HELPERS ────────────────────────────────────────────────────
        function getRole() { return currentUser ? currentUser.role : 'technician'; }

        function can(perm) {
            var r = getRole();
            if (r === 'admin') return true;
            if (r === 'supervisor') {
                if (perm === 'permadelete') return false;
                return true;
            }
            if (r === 'technician') {
                if (perm === 'archive' || perm === 'restore' || perm === 'permadelete' || perm === 'export') return false;
                return true;
            }
            return false;
        }

        function isAdmin() { return getRole() === 'admin'; }

        // ─── DOM REFS (same as before) ──────────────────────────────────────
        // ... (we'll keep the existing code for brevity; the logic is what changes)

        // ─── CHECK IF USERS EXIST (unchanged) ──────────────────────────────
        var usersRef = db.ref('users');

        function checkUsersExist() {
            usersRef.once('value').then(function(snap) {
                var data = snap.val();
                if (data) {
                    var count = Object.keys(data).length;
                    if (count === 0) {
                        document.getElementById('create-admin-section').classList.add('show');
                        document.getElementById('login-form').style.display = 'none';
                    } else {
                        document.getElementById('create-admin-section').classList.remove('show');
                        document.getElementById('login-form').style.display = '';
                    }
                } else {
                    document.getElementById('create-admin-section').classList.add('show');
                    document.getElementById('login-form').style.display = 'none';
                }
            }).catch(console.error);
        }

        // ─── LOGIN / CREATE ADMIN (unchanged) ──────────────────────────────
        // ... (same as before)

        // ─── RENDER HANDOVER (with ownership check) ─────────────────────────
        function renderHandover() {
            var h = document.getElementById('h-shift');
            if (h) h.value = getShift();
            var d = document.getElementById('h-date');
            if (d && !d.value) { var now = new Date();
                d.value = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now
                    .getDate()).padStart(2, '0'); }

            var arr = Object.keys(handovers).map(function(id) { return Object.assign({}, handovers[id], { _id: id }); });
            arr.sort(function(a, b) { return (b.created || 0) - (a.created || 0); });

            var el = document.getElementById('handover-history');
            if (!arr.length) {
                el.innerHTML =
                    '<div class="handover-empty"><div style="font-size:36px;margin-bottom:8px">📋</div><div>No handover reports yet</div></div>';
                return;
            }

            var currentName = currentUser ? currentUser.name : '';

            el.innerHTML = arr.map(function(r) {
                var ls = r.lineStatus || {};
                var lsBadges = LINES.map(function(l) {
                    var st = ls[l] || 'OK';
                    return '<span class="hl-badge hl-' + st + '">' + l + ': ' + st + '</span>';
                }).join('');
                var dt = r.created ? new Date(r.created).toLocaleString([], { month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit' }) : r.date || '';
                var editCount = r.editCount || 0;
                var editsLeft = 3 - editCount;
                var isOwner = currentName.toLowerCase() === (r.name || '').toLowerCase();
                var editSection = '';
                if (isOwner && editsLeft > 0) {
                    editSection = '<button class="edit-btn" data-id="' + r._id +
                        '" data-type="handover">✏️ Edit</button>' +
                        '<div class="edit-count">' + editsLeft + ' edit' + (editsLeft > 1 ? 's' : '') +
                        ' remaining</div>';
                } else if (isOwner && editsLeft === 0) {
                    editSection = '<div class="edit-locked">🔒 Locked — no more edits allowed</div>';
                } else {
                    editSection = '<div style="font-size:10px;color:var(--muted);margin-top:8px">👁️ View only</div>';
                }
                return '<div class="handover-card">' +
                    '<div class="handover-card-header">' +
                    '<div>' +
                    '<div class="handover-card-who">' + esc(r.name) +
                    ' <span style="color:var(--muted);font-weight:400;font-size:11px">(' + esc(r.role) +
                    ')</span></div>' +
                    '<div class="handover-card-meta">' + dt + '</div>' +
                    '</div>' +
                    '<div class="handover-shift-badge">' + esc((r.shift || '').replace('Shift ', 'S')) +
                    '</div>' +
                    '</div>' +
                    '<div class="handover-section"><div class="handover-section-title">🏭 Line Status</div><div class="handover-line-row">' +
                    lsBadges + '</div></div>' +
                    (r.openIssues ? '<div class="handover-section"><div class="handover-section-title">⚠️ Open Issues Carried</div><div class="handover-text">' +
                        esc(r.openIssues) + '</div></div>' : '') +
                    (r.equipment ? '<div class="handover-section"><div class="handover-section-title">⚙️ Equipment Notes</div><div class="handover-text">' +
                        esc(r.equipment) + '</div></div>' : '') +
                    (r.notes ? '<div class="handover-section"><div class="handover-section-title">📝 Notes for Next Shift</div><div class="handover-text">' +
                        esc(r.notes) + '</div></div>' : '') +
                    editSection +
                    '</div>';
            }).join('');

            document.querySelectorAll('.edit-btn[data-type="handover"]').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var id = btn.getAttribute('data-id');
                    var r = handovers[id];
                    if (r) startEditHandover(Object.assign({}, r, { _id: id }));
                });
            });
            applyRoleUI();
        }

        // ─── HANDOVER EDIT START ────────────────────────────────────────────
        function startEditHandover(r) {
            // Only allow if current user is the owner (double-check)
            if ((currentUser.name || '').toLowerCase() !== (r.name || '').toLowerCase()) {
                showToast('You are not the submitter of this report.');
                return;
            }
            editingHandoverId = r._id;
            // Pre-fill handover form
            document.getElementById('h-name').value = r.name || '';
            document.getElementById('h-name').setAttribute('readonly', true);
            document.getElementById('h-role').value = r.role || 'Shift Leader';
            document.getElementById('h-shift').value = r.shift || getShift();
            document.getElementById('h-date').value = r.date || '';
            document.getElementById('h-equipment').value = r.equipment || '';
            document.getElementById('h-openissues').value = r.openIssues || '';
            document.getElementById('h-notes').value = r.notes || '';
            // Restore line statuses
            var ls = r.lineStatus || {};
            LINES.forEach(function(l) {
                var st = ls[l] || 'OK';
                lineStatus[l] = st;
                document.querySelectorAll('.ls-btn[data-line="' + l + '"]').forEach(function(b) {
                    b.className = 'ls-btn' + (b.getAttribute('data-status') === st ? ' active-' + st : '');
                });
            });
            var submitBtn = document.getElementById('h-submit-btn');
            submitBtn.textContent = 'Save Edit →';
            submitBtn.disabled = false;
            showToast('Editing your handover report — save to update.');
            document.getElementById('handover-form-card').scrollIntoView({ behavior: 'smooth' });
        }

        // ─── LINE REPORT EDIT (with ownership check) ─────────────────────────
        function renderLineReport() {
            var lr = document.getElementById('lr-shift');
            if (lr) lr.value = getShift();
            var ld = document.getElementById('lr-date');
            if (ld && !ld.value) { var now = new Date();
                ld.value = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now
                    .getDate()).padStart(2, '0'); }

            var arr = Object.keys(lineReports).map(function(id) { return Object.assign({}, lineReports[id], { _id: id }); });
            arr.sort(function(a, b) { return (b.created || 0) - (a.created || 0); });

            var el = document.getElementById('linereport-history');
            if (!arr.length) {
                el.innerHTML =
                    '<div class="handover-empty"><div style="font-size:36px;margin-bottom:8px">📊</div><div>No line reports yet</div></div>';
                return;
            }

            var currentName = currentUser ? currentUser.name : '';

            el.innerHTML = arr.map(function(r) {
                var dt = r.created ? new Date(r.created).toLocaleString([], { month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit' }) : r.date || '';
                var lastEd = r.lastEdited ? ' · Last edited: ' + new Date(r.lastEdited).toLocaleString([],
                    { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
                var ct = r.ct || {};
                var hasQuality = r.model || r.issues || r.rootcause || r.action;
                var hasCT = ct.Printing || ct.SPI || ct.PP1 || ct.PP2 || ct.PP3;
                var editCount = r.editCount || 0;
                var editsLeft = 3 - editCount;
                var isOwner = currentName.toLowerCase() === (r.name || '').toLowerCase();
                var editSection = '';
                if (isOwner && editsLeft > 0) {
                    editSection = '<button class="edit-btn" data-id="' + r._id +
                        '" data-type="linereport">✏️ Edit</button>' +
                        '<div class="edit-count">' + editsLeft + ' edit' + (editsLeft > 1 ? 's' : '') +
                        ' remaining</div>';
                } else if (isOwner && editsLeft === 0) {
                    editSection = '<div class="edit-locked">🔒 Locked — no more edits allowed</div>';
                } else {
                    editSection = '<div style="font-size:10px;color:var(--muted);margin-top:8px">👁️ View only</div>';
                }

                return '<div class="handover-card">' +
                    '<div class="handover-card-header">' +
                    '<div>' +
                    '<div class="handover-card-who">' + esc(r.name) + '</div>' +
                    '<div class="handover-card-meta">Submitted: ' + dt + lastEd + (r.date ? ' · Production: ' +
                        esc(r.date) : '') + '  · ' + esc(r.shift || '') + '</div>' +
                    '</div>' +
                    '<div class="handover-shift-badge" style="background:var(--accent2);color:#000">' + esc(r
                        .line) + '</div>' +
                    '</div>' +
                    (hasQuality ?
                        '<div class="handover-section">' +
                        '<div class="handover-section-title">🔍 Quality Issues — Model: ' + esc(r.model ||
                            '-') + '</div>' +
                        (r.issues ? '<div style="margin-bottom:6px"><span style="font-size:10px;color:var(--muted)">TOP 3:</span><div class="handover-text">' +
                            esc(r.issues).replace(/\n/g, '<br>') + '</div></div>' : '') +
                        (r.rootcause ? '<div style="margin-bottom:6px"><span style="font-size:10px;color:var(--muted)">ROOT CAUSE:</span><div class="handover-text">' +
                            esc(r.rootcause).replace(/\n/g, '<br>') + '</div></div>' : '') +
                        (r.action ? '<div><span style="font-size:10px;color:var(--muted)">CORRECTIVE ACTION:</span><div class="handover-text">' +
                            esc(r.action).replace(/\n/g, '<br>') + '</div></div>' : '') +
                        '</div>' :
                        '') +
                    (hasCT ?
                        '<div class="handover-section">' +
                        '<div class="handover-section-title">⏱ Machine CT — Model: ' + esc(r.model || '-') +
                        '</div>' +
                        '<div style="overflow-x:auto"><table class="ho-table">' +
                        '<tr><th>Printing</th><th>SPI</th><th>P&amp;P 1</th><th>P&amp;P 2</th><th>P&amp;P 3</th></tr>' +
                        '<tr>' +
                        '<td>' + (ct.Printing || '-') + 's</td>' +
                        '<td>' + (ct.SPI || '-') + 's</td>' +
                        '<td>' + (ct.PP1 || '-') + 's</td>' +
                        '<td>' + (ct.PP2 || '-') + 's</td>' +
                        '<td>' + (ct.PP3 || '-') + 's</td>' +
                        '</tr>' +
                        '</table></div>' +
                        '</div>' :
                        '') +
                    editSection +
                    '</div>';
            }).join('');

            document.querySelectorAll('.edit-btn[data-type="linereport"]').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var id = btn.getAttribute('data-id');
                    var r = lineReports[id];
                    if (r) startEdit(Object.assign({}, r, { _id: id }));
                });
            });
            applyRoleUI();
        }

        // ─── LINE REPORT EDIT START ─────────────────────────────────────────
        function startEdit(r) {
            // Ownership check
            if ((currentUser.name || '').toLowerCase() !== (r.name || '').toLowerCase()) {
                showToast('You are not the submitter of this report.');
                return;
            }
            editingReportId = r._id;
            document.getElementById('lr-name').value = r.name || '';
            document.getElementById('lr-name').setAttribute('readonly', true);
            document.getElementById('lr-line').value = r.line || 'L1';
            document.getElementById('lr-shift').value = r.shift || getShift();
            document.getElementById('lr-date').value = r.date || '';
            document.getElementById('lr-model').value = r.model || '';
            document.getElementById('lr-issues').value = r.issues || '';
            document.getElementById('lr-rootcause').value = r.rootcause || '';
            document.getElementById('lr-action').value = r.action || '';
            var ct = r.ct || {};
            document.getElementById('lr-ct-printing').value = ct.Printing || '';
            document.getElementById('lr-ct-spi').value = ct.SPI || '';
            document.getElementById('lr-ct-pp1').value = ct.PP1 || '';
            document.getElementById('lr-ct-pp2').value = ct.PP2 || '';
            document.getElementById('lr-ct-pp3').value = ct.PP3 || '';
            document.getElementById('lr-edit-banner').classList.add('show');
            document.getElementById('lr-submit-btn').textContent = 'Save Edit →';
            document.getElementById('lr-submit-btn').disabled = false;
            document.getElementById('linereport-view').scrollIntoView({ behavior: 'smooth' });
        }

        // ─── CANCEL EDIT FUNCTIONS ──────────────────────────────────────────
        function cancelEdit() {
            editingReportId = null;
            document.getElementById('lr-edit-banner').classList.remove('show');
            document.getElementById('lr-submit-btn').textContent = 'Submit Line Report →';
            document.getElementById('lr-name').removeAttribute('readonly');
            ['lr-name', 'lr-model', 'lr-issues', 'lr-rootcause', 'lr-action',
                'lr-ct-printing', 'lr-ct-spi', 'lr-ct-pp1', 'lr-ct-pp2', 'lr-ct-pp3'
            ].forEach(function(id) { document.getElementById(id).value = ''; });
            document.getElementById('lr-submit-btn').disabled = true;
        }

        function cancelEditHandover() {
            editingHandoverId = null;
            document.getElementById('h-submit-btn').textContent = 'Submit Handover Report →';
            document.getElementById('h-name').removeAttribute('readonly');
            document.getElementById('h-name').value = '';
            document.getElementById('h-equipment').value = '';
            document.getElementById('h-openissues').value = '';
            document.getElementById('h-notes').value = '';
            // Reset line statuses
            LINES.forEach(function(l) {
                lineStatus[l] = 'OK';
                document.querySelectorAll('.ls-btn[data-line="' + l + '"]').forEach(function(b) {
                    b.className = 'ls-btn' + (b.getAttribute('data-status') === 'OK' ? ' active-OK' : '');
                });
            });
            document.getElementById('h-submit-btn').disabled = true;
            showToast('Edit cancelled');
        }

        // ─── OVERRIDE SUBMIT HANDLERS ──────────────────────────────────────
        // We'll modify the existing submit listeners to respect ownership and lock name field.
        // In the handover submit, we'll use the existing name from the report if editing.
        // In the line report submit, we'll do the same.

        // We'll need to modify the initFormHandlers function to include these changes.

        // ─── INIT FORM HANDLERS (with edit support) ────────────────────────
        function initFormHandlers() {
            // Add task (unchanged)
            document.getElementById('f-title').addEventListener('input', function() {
                document.getElementById('submit-btn').disabled = !this.value.trim();
            });
            document.getElementById('submit-btn').addEventListener('click', function() {
                var title = document.getElementById('f-title').value.trim();
                if (!title) return;
                tasksRef.push({
                    line: document.getElementById('f-line').value,
                    category: document.getElementById('f-cat').value,
                    priority: document.getElementById('f-priority').value,
                    status: 'Open',
                    title: title,
                    assignee: document.getElementById('f-assignee').value.trim() || 'Unassigned',
                    time: document.getElementById('f-time').value,
                    shift: document.getElementById('f-shift').value,
                    note: document.getElementById('f-note').value.trim(),
                    created: Date.now()
                });
                document.getElementById('f-title').value = '';
                document.getElementById('f-assignee').value = '';
                document.getElementById('f-note').value = '';
                document.getElementById('submit-btn').disabled = true;
                switchView('board');
                showToast('Issue logged ✓');
            });

            // Handover submit (including edit)
            document.getElementById('h-name').addEventListener('input', function() {
                // If editing, the field is readonly, so this won't fire.
                document.getElementById('h-submit-btn').disabled = !this.value.trim() && !editingHandoverId;
                if (!this.value.trim() && !editingHandoverId) {
                    document.getElementById('h-submit-btn').disabled = true;
                } else if (this.value.trim() || editingHandoverId) {
                    document.getElementById('h-submit-btn').disabled = false;
                }
            });
            document.getElementById('h-submit-btn').addEventListener('click', function() {
                // If editing, ensure the name hasn't been changed (though readonly prevents it)
                if (editingHandoverId) {
                    var original = handovers[editingHandoverId];
                    if (!original) { showToast('Report not found'); return; }
                    // Use the original name
                    var name = original.name;
                    // Build data from form
                    var data = {
                        name: name,
                        role: document.getElementById('h-role').value,
                        shift: document.getElementById('h-shift').value,
                        date: document.getElementById('h-date').value,
                        lineStatus: lineStatus,
                        equipment: document.getElementById('h-equipment').value.trim(),
                        openIssues: document.getElementById('h-openissues').value.trim() || '',
                        notes: document.getElementById('h-notes').value.trim() || ''
                    };
                    var editCount = (original.editCount || 0) + 1;
                    data.created = original.created || Date.now();
                    data.editCount = editCount;
                    data.lastEdited = Date.now();
                    handoverRef.child(editingHandoverId).set(data);
                    showToast('Handover updated (edit ' + editCount + '/3) ✓');
                    cancelEditHandover();
                    renderHandover();
                } else {
                    // New handover
                    var name = document.getElementById('h-name').value.trim();
                    if (!name) { showToast('Name required'); return; }
                    var openTasks = taskArray().filter(function(t) { return t.status !== 'Resolved'; });
                    var autoCarried = openTasks.length > 0 ? openTasks.map(function(t) { return t.line + ': ' +
                        t.title + ' [' + t.status + ']'; }).join('\n') : '';
                    var manualCarried = document.getElementById('h-openissues').value.trim();
                    handoverRef.push({
                        name: name,
                        role: document.getElementById('h-role').value,
                        shift: document.getElementById('h-shift').value,
                        date: document.getElementById('h-date').value,
                        lineStatus: lineStatus,
                        equipment: document.getElementById('h-equipment').value.trim(),
                        openIssues: manualCarried || autoCarried,
                        notes: document.getElementById('h-notes').value.trim(),
                        created: Date.now(),
                        editCount: 0
                    });
                    showToast('Handover report submitted ✓');
                    document.getElementById('h-name').value = '';
                    document.getElementById('h-equipment').value = '';
                    document.getElementById('h-openissues').value = '';
                    document.getElementById('h-notes').value = '';
                    document.getElementById('h-submit-btn').disabled = true;
                    Object.keys(lineStatus).forEach(function(l) { lineStatus[l] = 'OK'; });
                    document.querySelectorAll('.ls-btn').forEach(function(b) {
                        b.className = 'ls-btn' + (b.getAttribute('data-status') === 'OK' ? ' active-OK' :
                        '');
                    });
                    renderHandover();
                }
            });

            // Line Report submit (including edit)
            document.getElementById('lr-name').addEventListener('input', function() {
                if (editingReportId) {
                    // readonly, so ignore
                    return;
                }
                document.getElementById('lr-submit-btn').disabled = !this.value.trim();
            });
            document.getElementById('lr-submit-btn').addEventListener('click', function() {
                if (editingReportId) {
                    var original = lineReports[editingReportId];
                    if (!original) { showToast('Report not found'); return; }
                    var name = original.name;
                    var data = {
                        name: name,
                        line: document.getElementById('lr-line').value,
                        shift: document.getElementById('lr-shift').value,
                        date: document.getElementById('lr-date').value,
                        model: document.getElementById('lr-model').value.trim(),
                        issues: document.getElementById('lr-issues').value.trim(),
                        rootcause: document.getElementById('lr-rootcause').value.trim(),
                        action: document.getElementById('lr-action').value.trim(),
                        ct: {
                            Printing: document.getElementById('lr-ct-printing').value || '',
                            SPI: document.getElementById('lr-ct-spi').value || '',
                            PP1: document.getElementById('lr-ct-pp1').value || '',
                            PP2: document.getElementById('lr-ct-pp2').value || '',
                            PP3: document.getElementById('lr-ct-pp3').value || ''
                        }
                    };
                    var editCount = (original.editCount || 0) + 1;
                    data.created = original.created || Date.now();
                    data.editCount = editCount;
                    data.lastEdited = Date.now();
                    lineReportRef.child(editingReportId).set(data);
                    showToast('Report updated (edit ' + editCount + '/3) ✓');
                    cancelEdit();
                    renderLineReport();
                } else {
                    var name = document.getElementById('lr-name').value.trim();
                    if (!name) { showToast('Technician name required'); return; }
                    var data = {
                        name: name,
                        line: document.getElementById('lr-line').value,
                        shift: document.getElementById('lr-shift').value,
                        date: document.getElementById('lr-date').value,
                        model: document.getElementById('lr-model').value.trim(),
                        issues: document.getElementById('lr-issues').value.trim(),
                        rootcause: document.getElementById('lr-rootcause').value.trim(),
                        action: document.getElementById('lr-action').value.trim(),
                        ct: {
                            Printing: document.getElementById('lr-ct-printing').value || '',
                            SPI: document.getElementById('lr-ct-spi').value || '',
                            PP1: document.getElementById('lr-ct-pp1').value || '',
                            PP2: document.getElementById('lr-ct-pp2').value || '',
                            PP3: document.getElementById('lr-ct-pp3').value || ''
                        },
                        created: Date.now(),
                        editCount: 0
                    };
                    lineReportRef.push(data);
                    showToast('Line report submitted ✓');
                    ['lr-name', 'lr-model', 'lr-issues', 'lr-rootcause', 'lr-action',
                        'lr-ct-printing', 'lr-ct-spi', 'lr-ct-pp1', 'lr-ct-pp2', 'lr-ct-pp3'
                    ].forEach(function(id) { document.getElementById(id).value = ''; });
                    document.getElementById('lr-submit-btn').disabled = true;
                    renderLineReport();
                }
            });

            // User management (admin only) – unchanged
            document.getElementById('add-user-btn').addEventListener('click', function() {
                if (!isAdmin()) { showToast('Admin only'); return; }
                var name = document.getElementById('new-user-name').value.trim();
                var badge = document.getElementById('new-user-badge').value.trim();
                var role = document.getElementById('new-user-role').value;
                if (!name || !badge) {
                    document.getElementById('add-user-msg').textContent = 'Name and badge required.';
                    return;
                }
                var msgEl = document.getElementById('add-user-msg');
                msgEl.textContent = 'Adding…';
                msgEl.style.color = 'var(--muted)';
                usersRef.child(badge).once('value').then(function(snap) {
                    if (snap.exists()) {
                        msgEl.textContent = 'Badge already exists.';
                        msgEl.style.color = 'var(--critical)';
                        return;
                    }
                    return usersRef.child(badge).set({
                        name: name,
                        role: role
                    }).then(function() {
                        msgEl.textContent = '✅ User added!';
                        msgEl.style.color = 'var(--green)';
                        document.getElementById('new-user-name').value = '';
                        document.getElementById('new-user-badge').value = '';
                        renderUserList();
                    });
                }).catch(function(err) {
                    msgEl.textContent = 'Error: ' + err.message;
                    msgEl.style.color = 'var(--critical)';
                });
            });
        }

        // ─── OTHER FUNCTIONS (renderBoard, renderSummary, renderArchive, etc.) are unchanged ──
        // (We keep the existing implementation from the previous version)

        // ─── STARTUP ──────────────────────────────────────────────────────────
        checkUsersExist();
        console.log('🔐 SMT Control – Only the original submitter can edit their own reports (3 edits max).');
    </script>
</body>
</html>
